name: Deploy to WordPress.org SVN
run-name: Deploy v${{ inputs.version }} to WordPress.org SVN

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to deploy (e.g. 1.0.7)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy v${{ inputs.version }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Deploy to WordPress.org SVN
        uses: 10up/action-wordpress-plugin-deploy@v2
        with:
          generate-zip: false
        env:
          SVN_USERNAME: ${{ secrets.WP_ORG_SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.WP_ORG_SVN_PASSWORD }}
          SLUG: segmentflow-connect
          BUILD_DIR: "."
          ASSETS_DIR: ".wordpress-org"
