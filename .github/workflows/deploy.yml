name: Deploy to WordPress.org SVN
run-name: Deploy v${{ inputs.version }} to WordPress.org SVN

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to deploy (e.g. 1.0.7)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy v${{ inputs.version }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}
          fetch-depth: 0

      - name: Verify tag exists
        run: |
          git fetch --tags
          git rev-parse "v${{ inputs.version }}" >/dev/null 2>&1 || \
            (echo "::error::Tag v${{ inputs.version }} does not exist" && exit 1)
          echo "Tag v${{ inputs.version }} verified."

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Deploy to WordPress.org SVN
        uses: 10up/action-wordpress-plugin-deploy@2.3.0
        with:
          generate-zip: false
        env:
          SVN_USERNAME: ${{ secrets.WP_ORG_SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.WP_ORG_SVN_PASSWORD }}
          SLUG: segmentflow-connect
          VERSION: ${{ inputs.version }}
          ASSETS_DIR: ".wordpress-org"
