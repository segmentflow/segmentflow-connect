name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Release Please
    runs-on: ubuntu-24.04
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4.4.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Update workflow run name
        if: steps.release.outputs.release_created == 'true'
        run: |
          gh api \
            --method PATCH \
            /repos/${{ github.repository }}/actions/runs/${{ github.run_id }} \
            -f display_title="Release v${{ steps.release.outputs.version }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-publish:
    name: Build & Publish v${{ needs.release.outputs.version }}
    needs: release
    if: needs.release.outputs.release_created == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag_name }}

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Sync changelog to readme.txt
        run: node scripts/sync-changelog.mjs

      - name: Create plugin zip
        run: pnpm plugin:zip

      - name: Upload zip to GitHub Release
        run: gh release upload "$TAG_NAME" "segmentflow-connect-${VERSION}.zip" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release.outputs.tag_name }}
          VERSION: ${{ needs.release.outputs.version }}

      - name: Deploy to WordPress.org SVN
        if: ${{ secrets.WP_ORG_SVN_USERNAME != '' }}
        uses: 10up/action-wordpress-plugin-deploy@v2
        with:
          generate-zip: false
        env:
          SVN_USERNAME: ${{ secrets.WP_ORG_SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.WP_ORG_SVN_PASSWORD }}
          SLUG: segmentflow-connect
          BUILD_DIR: "."
          ASSETS_DIR: ".wordpress-org"
